<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数学I 学習アプリ</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<style>
:root {
  --primary: #1a5276;
  --primary-light: #2980b9;
  --accent: #e67e22;
  --bg: #f0f4f8;
  --card-bg: #ffffff;
  --text: #2c3e50;
  --text-light: #7f8c8d;
  --border: #dcdde1;
  --known: #27ae60;
  --learning: #f39c12;
  --unknown: #95a5a6;
  --new: #3498db;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI','Hiragino Kaku Gothic ProN',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

header {
  background:linear-gradient(135deg,#1a3c6e,#2980b9);
  color:white; padding:18px; text-align:center;
  box-shadow:0 2px 10px rgba(0,0,0,.15);
}
header h1 { font-size:1.5em; }
header p { font-size:.8em; opacity:.85; margin-top:4px; }

.nav {
  display:flex; justify-content:center; gap:6px; padding:12px;
  flex-wrap:wrap; background:white; border-bottom:1px solid var(--border);
}
.nav button {
  padding:8px 16px; border:2px solid var(--primary); background:white;
  color:var(--primary); border-radius:20px; cursor:pointer; font-size:.85em;
  font-weight:600; transition:all .2s;
}
.nav button:hover,.nav button.active { background:var(--primary); color:white; }

.container { max-width:800px; margin:0 auto; padding:16px; }
.section { display:none; }
.section.active { display:block; }

/* Dashboard */
.stats-grid {
  display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:12px; margin:16px 0;
}
.stat-card {
  background:white; border-radius:12px; padding:16px; text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}
.stat-card .num { font-size:2em; font-weight:700; }
.stat-card .label { font-size:.8em; color:var(--text-light); margin-top:4px; }
.stat-card.known .num { color:var(--known); }
.stat-card.learning .num { color:var(--learning); }
.stat-card.unknown .num { color:var(--unknown); }
.stat-card.total .num { color:var(--primary); }

.progress-bar-container {
  background:#e0e0e0; border-radius:10px; height:24px; margin:16px 0;
  overflow:hidden; display:flex;
}
.progress-bar-container .seg-known { background:var(--known); height:100%; transition:width .3s; }
.progress-bar-container .seg-learning { background:var(--learning); height:100%; transition:width .3s; }

.chapter-stats { margin:16px 0; }
.chapter-row {
  display:flex; align-items:center; gap:10px; padding:10px 12px;
  background:white; border-radius:8px; margin:6px 0;
  box-shadow:0 1px 4px rgba(0,0,0,.06); cursor:pointer; transition:all .2s;
}
.chapter-row:hover { box-shadow:0 2px 8px rgba(0,0,0,.12); }
.chapter-row .name { font-weight:600; min-width:130px; font-size:.9em; }
.chapter-row .bar-bg { flex:1; background:#e0e0e0; border-radius:6px; height:16px; overflow:hidden; display:flex; }
.chapter-row .bar-bg div { height:100%; transition:width .3s; }
.chapter-row .pct { font-size:.85em; min-width:50px; text-align:right; }

/* Filter */
.filter-bar {
  display:flex; flex-wrap:wrap; gap:8px; margin:12px 0; align-items:center;
}
.filter-bar label { font-weight:600; font-size:.85em; }
.filter-bar select {
  padding:6px 10px; border:1px solid var(--border); border-radius:8px; font-size:.85em;
}

/* Formula Card (flashcard) */
.card-wrapper {
  perspective:1000px; margin:20px auto; max-width:550px; min-height:300px; cursor:pointer;
}
.card-inner {
  position:relative; width:100%; min-height:300px; transition:transform .5s;
  transform-style:preserve-3d;
}
.card-wrapper.flipped .card-inner { transform:rotateY(180deg); }
.card-front,.card-back {
  position:absolute; width:100%; min-height:300px; backface-visibility:hidden;
  border-radius:16px; display:flex; flex-direction:column;
  align-items:center; justify-content:center; padding:24px;
  box-shadow:0 4px 20px rgba(0,0,0,.1);
}
.card-front {
  background:linear-gradient(135deg,#fff,#f8f9fa); border:2px solid var(--border);
}
.card-back {
  background:linear-gradient(135deg,#1a3c6e,#2980b9);
  color:white; transform:rotateY(180deg);
}
.card-title { font-size:1.1em; font-weight:700; margin-bottom:12px; color:var(--primary); }
.card-back .card-title { color:#ffd700; }
.card-formula { font-size:1.3em; margin:8px 0; text-align:center; line-height:1.8; }
.card-note { font-size:.85em; margin-top:8px; opacity:.9; text-align:center; line-height:1.5; }
.card-chapter-badge {
  position:absolute; top:12px; right:16px; font-size:.7em; padding:3px 10px;
  border-radius:12px; background:var(--primary-light); color:white;
}
.card-front .card-chapter-badge { background:#eee; color:var(--text-light); }
.card-status-badge {
  position:absolute; top:12px; left:16px; font-size:.7em; padding:3px 10px;
  border-radius:12px; font-weight:600;
}
.badge-known { background:var(--known); color:white; }
.badge-learning { background:var(--learning); color:white; }
.badge-new { background:var(--new); color:white; }

.card-nav {
  display:flex; justify-content:center; gap:12px; margin:16px 0;
}
.card-nav button {
  padding:10px 20px; border:none; border-radius:10px; cursor:pointer;
  font-size:.9em; font-weight:600; transition:all .2s;
}
.btn-prev,.btn-next { background:#ecf0f1; color:var(--text); }
.btn-prev:hover,.btn-next:hover { background:#d5dbdb; }
.btn-shuffle { background:var(--accent); color:white; }
.btn-shuffle:hover { background:#d35400; }

.status-buttons {
  display:flex; justify-content:center; gap:10px; margin:12px 0;
}
.status-buttons button {
  padding:10px 18px; border:none; border-radius:10px; cursor:pointer;
  font-weight:600; font-size:.85em; color:white; transition:all .2s;
}
.btn-known { background:var(--known); }
.btn-learning { background:var(--learning); }
.btn-unknown { background:var(--unknown); }
.btn-known:hover { background:#219a52; }
.btn-learning:hover { background:#d68910; }
.btn-unknown:hover { background:#7f8c8d; }

.card-counter {
  text-align:center; font-size:.85em; color:var(--text-light); margin:8px 0;
}
.hint { text-align:center; font-size:.8em; color:var(--text-light); margin:8px 0; }

/* Problem Practice */
.problem-card {
  background:white; border-radius:16px; padding:24px; margin:16px 0;
  box-shadow:0 4px 16px rgba(0,0,0,.08); border-left:4px solid var(--primary-light);
}
.problem-card .problem-header {
  display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;
}
.problem-card .problem-id { font-weight:700; color:var(--primary); font-size:1.1em; }
.problem-card .problem-diff {
  font-size:.75em; padding:3px 10px; border-radius:12px; font-weight:600;
}
.diff-basic { background:#e8f8f0; color:var(--known); }
.diff-standard { background:#fef9e7; color:var(--learning); }
.diff-advanced { background:#fef0f0; color:#e74c3c; }
.problem-card .problem-text {
  font-size:1em; line-height:1.8; margin-bottom:16px;
}
.problem-card .solution-area {
  background:#f8f9fa; border-radius:10px; padding:16px; display:none;
  border:1px solid var(--border);
}
.problem-card .solution-area.visible { display:block; }
.problem-card .solution-area h4 { color:var(--primary); margin-bottom:8px; font-size:.95em; }
.problem-card .solution-text { font-size:.95em; line-height:1.8; }
.problem-card .btn-show-solution {
  padding:8px 20px; background:var(--accent); color:white; border:none;
  border-radius:10px; cursor:pointer; font-weight:600; font-size:.85em; transition:all .2s;
}
.problem-card .btn-show-solution:hover { background:#d35400; }
.problem-card .btn-mark {
  padding:6px 14px; border:none; border-radius:8px; cursor:pointer;
  font-weight:600; font-size:.8em; color:white; margin-left:6px; transition:all .2s;
}

/* Quiz */
.quiz-settings {
  background:white; border-radius:12px; padding:16px; margin:16px 0;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
  display:flex; flex-wrap:wrap; gap:10px; align-items:center;
}
.quiz-settings label { font-weight:600; font-size:.85em; }
.quiz-settings select {
  padding:6px 12px; border:1px solid var(--border); border-radius:8px; font-size:.85em;
}
.btn-quiz-start {
  padding:10px 24px; background:var(--accent); color:white; border:none;
  border-radius:10px; cursor:pointer; font-weight:600; font-size:.9em; transition:all .2s;
}
.btn-quiz-start:hover { background:#d35400; }
.quiz-question {
  background:white; border-radius:16px; padding:32px; margin:20px auto;
  max-width:550px; text-align:center;
  box-shadow:0 4px 20px rgba(0,0,0,.1);
}
.quiz-prompt { font-size:1em; font-weight:600; margin-bottom:12px; color:var(--text-light); }
.quiz-formula { font-size:1.4em; font-weight:700; margin-bottom:20px; }
.quiz-options { display:flex; flex-direction:column; gap:10px; }
.quiz-option {
  padding:14px 20px; border:2px solid var(--border); border-radius:12px;
  background:white; cursor:pointer; font-size:1em; text-align:left;
  transition:all .2s; position:relative;
}
.quiz-option:hover { border-color:var(--primary-light); background:#f0f7ff; }
.quiz-option.correct { border-color:var(--known); background:#e8f8f0; }
.quiz-option.wrong { border-color:#e74c3c; background:#fef0f0; }
.quiz-option.disabled { pointer-events:none; }
.quiz-result {
  margin:20px auto; max-width:500px; text-align:center; padding:16px;
  border-radius:12px;
}
.quiz-result.correct-result { background:#e8f8f0; color:var(--known); }
.quiz-result.wrong-result { background:#fef0f0; color:#e74c3c; }
.quiz-score-bar {
  display:flex; justify-content:center; gap:20px; margin:16px 0;
  font-size:1.1em; font-weight:600;
}
.quiz-score-bar .q-correct { color:var(--known); }
.quiz-score-bar .q-wrong { color:#e74c3c; }
.quiz-progress {
  text-align:center; font-size:.85em; color:var(--text-light); margin:8px 0;
}
.quiz-next-btn {
  padding:10px 24px; background:var(--primary-light); color:white; border:none;
  border-radius:10px; cursor:pointer; font-weight:600; margin-top:12px; transition:all .2s;
}
.quiz-next-btn:hover { background:var(--primary); }
.quiz-final {
  background:white; border-radius:16px; padding:32px; margin:20px auto;
  max-width:500px; text-align:center; box-shadow:0 4px 20px rgba(0,0,0,.1);
}
.quiz-final h2 { color:var(--primary); margin-bottom:16px; }
.quiz-final .big-score { font-size:3em; font-weight:700; }
.quiz-final .big-score.good { color:var(--known); }
.quiz-final .big-score.mid { color:var(--learning); }
.quiz-final .big-score.bad { color:#e74c3c; }

/* Formula list */
.formula-table {
  width:100%; border-collapse:collapse; font-size:.85em;
  background:white; border-radius:10px; overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}
.formula-table th {
  background:var(--primary); color:white; padding:10px 12px; text-align:left;
  position:sticky; top:0;
}
.formula-table td { padding:8px 12px; border-bottom:1px solid #f0f0f0; vertical-align:top; }
.formula-table tr:hover { background:#f8f9fa; }
.formula-table .st-known { color:var(--known); font-weight:600; }
.formula-table .st-learning { color:var(--learning); font-weight:600; }
.formula-table .st-new { color:var(--text-light); }
.table-container { max-height:60vh; overflow-y:auto; border-radius:10px; }

/* Settings */
.danger-zone {
  margin:30px 0; padding:16px; background:#fef0f0; border:1px solid #f5c6cb;
  border-radius:10px;
}
.danger-zone h3 { color:var(--accent); margin-bottom:8px; }
.btn-reset {
  padding:10px 20px; background:#e74c3c; color:white; border:none;
  border-radius:8px; cursor:pointer; font-weight:600;
}
.btn-reset:hover { background:#c0392b; }

/* Responsive */
@media (max-width:600px) {
  .card-formula { font-size:1.1em; }
  .card-wrapper { min-height:260px; }
  .card-front,.card-back { min-height:260px; padding:16px; }
  .nav button { padding:6px 10px; font-size:.78em; }
}
</style>
</head>
<body>

<header>
  <h1>数学I 学習アプリ</h1>
  <p>公式カード・問題演習・クイズで完全マスター</p>
</header>

<div class="nav">
  <button class="active" onclick="showSection('dashboard')">ダッシュボード</button>
  <button onclick="showSection('cards')">公式カード</button>
  <button onclick="showSection('problems')">問題演習</button>
  <button onclick="showSection('quiz')">クイズ</button>
  <button onclick="showSection('list')">一覧</button>
  <button onclick="showSection('settings')">設定</button>
</div>

<div class="container">

<!-- Dashboard -->
<div id="sec-dashboard" class="section active">
  <div class="stats-grid">
    <div class="stat-card total"><div class="num" id="stat-total">0</div><div class="label">全公式</div></div>
    <div class="stat-card known"><div class="num" id="stat-known">0</div><div class="label">覚えた</div></div>
    <div class="stat-card learning"><div class="num" id="stat-learning">0</div><div class="label">学習中</div></div>
    <div class="stat-card unknown"><div class="num" id="stat-unknown">0</div><div class="label">未学習</div></div>
  </div>
  <div class="progress-bar-container">
    <div class="seg-known" id="prog-known"></div>
    <div class="seg-learning" id="prog-learning"></div>
  </div>
  <h3 style="margin:16px 0 8px; font-size:1em;">章別の進捗</h3>
  <div class="chapter-stats" id="chapter-stats"></div>

  <h3 style="margin:20px 0 8px; font-size:1em;">問題演習の進捗</h3>
  <div class="stats-grid">
    <div class="stat-card known"><div class="num" id="stat-p-solved">0</div><div class="label">正解済み</div></div>
    <div class="stat-card learning"><div class="num" id="stat-p-attempted">0</div><div class="label">挑戦済み</div></div>
    <div class="stat-card total"><div class="num" id="stat-p-total">0</div><div class="label">全問題</div></div>
  </div>
</div>

<!-- Formula Cards -->
<div id="sec-cards" class="section">
  <div class="filter-bar">
    <label>章:</label>
    <select id="card-chapter-filter" onchange="filterCards()">
      <option value="all">全章</option>
      <option value="ch1">第1章 数と式</option>
      <option value="ch2">第2章 集合と命題</option>
      <option value="ch3">第3章 2次関数</option>
      <option value="ch4">第4章 図形と計量</option>
      <option value="ch5">第5章 データの分析</option>
    </select>
    <label>状態:</label>
    <select id="card-status-filter" onchange="filterCards()">
      <option value="all">すべて</option>
      <option value="new">未学習</option>
      <option value="learning">学習中</option>
      <option value="known">覚えた</option>
    </select>
  </div>
  <div class="card-wrapper" id="card-wrapper" onclick="flipCard()">
    <div class="card-inner" id="card-inner">
      <div class="card-front" id="card-front"></div>
      <div class="card-back" id="card-back"></div>
    </div>
  </div>
  <div class="hint">クリックでカードを裏返す</div>
  <div class="card-counter" id="card-counter"></div>
  <div class="card-nav">
    <button class="btn-prev" onclick="prevCard()">&#9664; 前へ</button>
    <button class="btn-shuffle" onclick="shuffleCards()">シャッフル</button>
    <button class="btn-next" onclick="nextCard()">次へ &#9654;</button>
  </div>
  <div class="status-buttons">
    <button class="btn-known" onclick="markCard('known')">覚えた</button>
    <button class="btn-learning" onclick="markCard('learning')">学習中</button>
    <button class="btn-unknown" onclick="markCard('new')">未学習</button>
  </div>
</div>

<!-- Problems -->
<div id="sec-problems" class="section">
  <div class="filter-bar">
    <label>章:</label>
    <select id="prob-chapter-filter" onchange="filterProblems()">
      <option value="all">全章</option>
      <option value="ch1">第1章 数と式</option>
      <option value="ch2">第2章 集合と命題</option>
      <option value="ch3">第3章 2次関数</option>
      <option value="ch4">第4章 図形と計量</option>
      <option value="ch5">第5章 データの分析</option>
    </select>
    <label>難易度:</label>
    <select id="prob-diff-filter" onchange="filterProblems()">
      <option value="all">すべて</option>
      <option value="basic">基本</option>
      <option value="standard">標準</option>
      <option value="advanced">応用</option>
    </select>
  </div>
  <div id="problems-container"></div>
</div>

<!-- Quiz -->
<div id="sec-quiz" class="section">
  <div class="quiz-settings">
    <label>章:</label>
    <select id="quiz-chapter">
      <option value="all">全章</option>
      <option value="ch1">第1章 数と式</option>
      <option value="ch2">第2章 集合と命題</option>
      <option value="ch3">第3章 2次関数</option>
      <option value="ch4">第4章 図形と計量</option>
      <option value="ch5">第5章 データの分析</option>
    </select>
    <label>問題数:</label>
    <select id="quiz-count">
      <option value="5">5問</option>
      <option value="10" selected>10問</option>
      <option value="20">20問</option>
      <option value="all">全問</option>
    </select>
    <button class="btn-quiz-start" onclick="startQuiz()">クイズ開始</button>
  </div>
  <div id="quiz-area"></div>
</div>

<!-- List -->
<div id="sec-list" class="section">
  <div class="filter-bar">
    <label>章:</label>
    <select id="list-chapter-filter" onchange="renderList()">
      <option value="all">全章</option>
      <option value="ch1">第1章 数と式</option>
      <option value="ch2">第2章 集合と命題</option>
      <option value="ch3">第3章 2次関数</option>
      <option value="ch4">第4章 図形と計量</option>
      <option value="ch5">第5章 データの分析</option>
    </select>
  </div>
  <div class="table-container">
    <table class="formula-table">
      <thead><tr><th>ID</th><th>公式名</th><th>章</th><th>状態</th></tr></thead>
      <tbody id="formula-list-body"></tbody>
    </table>
  </div>
</div>

<!-- Settings -->
<div id="sec-settings" class="section">
  <div class="danger-zone">
    <h3>データのリセット</h3>
    <p style="margin:8px 0;font-size:.9em;">学習進捗をすべてリセットします。この操作は取り消せません。</p>
    <button class="btn-reset" onclick="resetAll()">すべてリセット</button>
  </div>
</div>

</div>

<script>
// ============================================================
// DATA: Formulas (公式カード)
// ============================================================
const formulas = [
  // 第1章 数と式
  {id:"f1",ch:"ch1",title:"展開: 和の2乗",front:"$(a+b)^2$ を展開すると？",back:"$(a+b)^2 = a^2 + 2ab + b^2$",note:"両端を2乗して中央は2倍"},
  {id:"f2",ch:"ch1",title:"展開: 差の2乗",front:"$(a-b)^2$ を展開すると？",back:"$(a-b)^2 = a^2 - 2ab + b^2$",note:"符号に注意"},
  {id:"f3",ch:"ch1",title:"展開: 和と差の積",front:"$(a+b)(a-b)$ を展開すると？",back:"$(a+b)(a-b) = a^2 - b^2$",note:"差の2乗の形"},
  {id:"f4",ch:"ch1",title:"展開: (x+a)(x+b)",front:"$(x+a)(x+b)$ を展開すると？",back:"$(x+a)(x+b) = x^2 + (a+b)x + ab$",note:"足して $x$ の係数、掛けて定数項"},
  {id:"f5",ch:"ch1",title:"展開: (ax+b)(cx+d)",front:"$(ax+b)(cx+d)$ を展開すると？",back:"$(ax+b)(cx+d) = acx^2 + (ad+bc)x + bd$",note:"たすき掛けの元"},
  {id:"f6",ch:"ch1",title:"因数分解: たすき掛け",front:"$acx^2+(ad+bc)x+bd$ の因数分解は？",back:"$(ax+b)(cx+d)$\n\nたすき掛けで $ad+bc$ が一致する組を探す",note:"$x^2$ の係数が1でない場合に使用"},
  {id:"f7",ch:"ch1",title:"因数分解: 置き換え",front:"共通する式のかたまりがある因数分解は？",back:"共通部分を $t$ とおいて因数分解\n\n例: $x^4-5x^2+4$ → $t=x^2$ とおく\n$(t-1)(t-4) = (x^2-1)(x^2-4)$",note:"置き換え後にさらに因数分解できないか確認"},
  {id:"f8",ch:"ch1",title:"対称式: 基本変換",front:"$a+b, ab$ が分かっているとき\n$a^2+b^2 = ?$",back:"$a^2+b^2 = (a+b)^2 - 2ab$",note:"対称式は基本対称式で表せる"},
  {id:"f9",ch:"ch1",title:"根号の簡略化",front:"$\\sqrt{48}$ を簡単にすると？",back:"$\\sqrt{48} = \\sqrt{16 \\times 3} = 4\\sqrt{3}$",note:"素因数分解して完全平方数を外に出す"},
  {id:"f10",ch:"ch1",title:"分母の有理化",front:"$\\dfrac{1}{\\sqrt{a}+\\sqrt{b}}$ の有理化は？",back:"$\\dfrac{\\sqrt{a}-\\sqrt{b}}{a-b}$\n\n分母分子に $\\sqrt{a}-\\sqrt{b}$ を掛ける",note:"和と差の積 $= a - b$ を利用"},
  {id:"f11",ch:"ch1",title:"二重根号",front:"$\\sqrt{a+2\\sqrt{b}}$ の二重根号を外すには？",back:"$p+q=a, pq=b$ となる $p,q$ を見つける\n$\\sqrt{a+2\\sqrt{b}} = \\sqrt{p}+\\sqrt{q}$",note:"発展内容"},
  {id:"f12",ch:"ch1",title:"1次不等式の注意",front:"不等式で負の数を掛ける（割る）と？",back:"不等号の向きが反転する\n\n$-2x > 6$ → $x < -3$",note:"最も多いミス！"},
  {id:"f13",ch:"ch1",title:"絶対値の不等式",front:"$|X| < c$ の解は？\n$|X| > c$ の解は？",back:"$|X| < c$ → $-c < X < c$（挟む）\n$|X| > c$ → $X < -c$ または $X > c$（外側）",note:"「小さいは挟む、大きいは外側」"},

  // 第2章 集合と命題
  {id:"f14",ch:"ch2",title:"集合の演算",front:"$A \\cap B$, $A \\cup B$, $\\bar{A}$ の意味は？",back:"$A \\cap B$: 共通部分（かつ）\n$A \\cup B$: 和集合（または）\n$\\bar{A}$: 補集合（$A$ でない）",note:"ベン図で視覚的に理解"},
  {id:"f15",ch:"ch2",title:"包除原理",front:"$n(A \\cup B)$ の求め方は？",back:"$n(A \\cup B) = n(A) + n(B) - n(A \\cap B)$\n\nどちらにも属さない $= n(U) - n(A \\cup B)$",note:"重複を引く"},
  {id:"f16",ch:"ch2",title:"ド・モルガンの法則",front:"$\\overline{A \\cap B}$ と $\\overline{A \\cup B}$ は？",back:"$\\overline{A \\cap B} = \\bar{A} \\cup \\bar{B}$\n$\\overline{A \\cup B} = \\bar{A} \\cap \\bar{B}$",note:"$\\cap$ と $\\cup$ が入れ替わる"},
  {id:"f17",ch:"ch2",title:"必要条件・十分条件",front:"$p \\Rightarrow q$ が真のとき\n$p$ は $q$ の何条件？",back:"$p$ は $q$ の十分条件\n$q$ は $p$ の必要条件\n\n覚え方: 十分→「それだけでOK」\n必要→「最低限要る」",note:"両方真なら必要十分条件"},
  {id:"f18",ch:"ch2",title:"逆・裏・対偶",front:"命題 $p \\Rightarrow q$ の\n逆・裏・対偶は？",back:"逆: $q \\Rightarrow p$\n裏: $\\bar{p} \\Rightarrow \\bar{q}$\n対偶: $\\bar{q} \\Rightarrow \\bar{p}$\n\n元の命題と対偶は真偽が一致する",note:"対偶は証明で超重要"},
  {id:"f19",ch:"ch2",title:"背理法",front:"背理法の手順は？",back:"1. 結論を否定して仮定する\n2. 論理を進めて矛盾を導く\n3. 仮定が誤り → 元の結論が正しい",note:"$\\sqrt{3}$ が無理数の証明が典型"},

  // 第3章 2次関数
  {id:"f20",ch:"ch3",title:"平方完成",front:"$y = ax^2 + bx + c$ の平方完成の手順は？",back:"$y = a\\left(x + \\dfrac{b}{2a}\\right)^2 - \\dfrac{b^2-4ac}{4a}$\n\n頂点: $\\left(-\\dfrac{b}{2a}, -\\dfrac{b^2-4ac}{4a}\\right)$\n軸: $x = -\\dfrac{b}{2a}$",note:"$a$ のくくり出し忘れが最も多いミス"},
  {id:"f21",ch:"ch3",title:"平行移動",front:"$y = f(x)$ を $x$ 軸方向に $p$、\n$y$ 軸方向に $q$ 移動すると？",back:"$y - q = f(x - p)$\nすなわち $y = f(x-p) + q$",note:"$x$ は引く、$y$ は足す"},
  {id:"f22",ch:"ch3",title:"対称移動",front:"$y = f(x)$ の対称移動は？",back:"$x$ 軸対称: $y = -f(x)$\n$y$ 軸対称: $y = f(-x)$\n原点対称: $y = -f(-x)$",note:"置き換えて考える"},
  {id:"f23",ch:"ch3",title:"2次関数の最大最小",front:"定義域制限付きの最大最小の\n考え方は？",back:"1. 平方完成して頂点を求める\n2. 頂点が定義域に含まれるか確認\n3. 含まれる → 頂点が最大or最小\n4. 含まれない → 両端で比較",note:"グラフを描いて考える"},
  {id:"f24",ch:"ch3",title:"2次関数の決定 (3パターン)",front:"2次関数を決定する3パターンは？",back:"1. 頂点が分かる → $y = a(x-p)^2+q$\n2. $x$ 切片が分かる → $y = a(x-\\alpha)(x-\\beta)$\n3. 3点が分かる → $y = ax^2+bx+c$ に代入",note:"条件に応じて使い分ける"},
  {id:"f25",ch:"ch3",title:"解の公式",front:"$ax^2 + bx + c = 0$ の解は？",back:"$x = \\dfrac{-b \\pm \\sqrt{b^2-4ac}}{2a}$",note:"判別式 $D = b^2-4ac$"},
  {id:"f26",ch:"ch3",title:"判別式と実数解",front:"判別式 $D = b^2-4ac$ と解の関係は？",back:"$D > 0$: 異なる2つの実数解\n$D = 0$: 重解（1つの実数解）\n$D < 0$: 実数解なし",note:"グラフとx軸の交点の個数"},
  {id:"f27",ch:"ch3",title:"2次不等式の解法",front:"$ax^2+bx+c > 0$ ($a>0$) の解き方は？",back:"$D>0$: $x < \\alpha$ または $x > \\beta$（外側）\n$D=0$: $x \\neq$ 重解 の全実数\n$D<0$: すべての実数",note:"$\\leq 0$ なら内側（$\\alpha \\leq x \\leq \\beta$）"},
  {id:"f28",ch:"ch3",title:"すべての実数で成立",front:"$ax^2+bx+c > 0$ が\nすべての実数で成り立つ条件は？",back:"$a > 0$ かつ $D < 0$\n\n$(D = b^2 - 4ac < 0)$",note:"グラフが $x$ 軸より上にある"},
  {id:"f29",ch:"ch3",title:"解の配置",front:"2次方程式の解が特定の範囲に\nあるための条件は？",back:"例: 2解がともに正\n1. $D \\geq 0$\n2. 軸 $> 0$\n3. $f(0) > 0$\n\nグラフの位置で条件を立てる",note:"判別式・軸・端点の3条件"},

  // 第4章 図形と計量
  {id:"f30",ch:"ch4",title:"三角比の定義",front:"直角三角形における\n$\\sin\\theta, \\cos\\theta, \\tan\\theta$ は？",back:"$\\sin\\theta = \\dfrac{\\text{対辺}}{\\text{斜辺}}$\n$\\cos\\theta = \\dfrac{\\text{隣辺}}{\\text{斜辺}}$\n$\\tan\\theta = \\dfrac{\\text{対辺}}{\\text{隣辺}}$",note:"「サイン=たい/しゃ」"},
  {id:"f31",ch:"ch4",title:"三角比の相互関係",front:"$\\sin^2\\theta + \\cos^2\\theta = ?$\n$\\tan\\theta = ?$",back:"$\\sin^2\\theta + \\cos^2\\theta = 1$\n$\\tan\\theta = \\dfrac{\\sin\\theta}{\\cos\\theta}$\n$1 + \\tan^2\\theta = \\dfrac{1}{\\cos^2\\theta}$",note:"最も基本的な関係式"},
  {id:"f32",ch:"ch4",title:"特殊角の三角比",front:"$30°, 45°, 60°$ の三角比は？",back:"$\\sin 30° = \\frac{1}{2},\\; \\cos 30° = \\frac{\\sqrt{3}}{2},\\; \\tan 30° = \\frac{1}{\\sqrt{3}}$\n$\\sin 45° = \\frac{\\sqrt{2}}{2},\\; \\cos 45° = \\frac{\\sqrt{2}}{2},\\; \\tan 45° = 1$\n$\\sin 60° = \\frac{\\sqrt{3}}{2},\\; \\cos 60° = \\frac{1}{2},\\; \\tan 60° = \\sqrt{3}$",note:"暗記必須！"},
  {id:"f33",ch:"ch4",title:"鈍角の三角比",front:"$\\sin(180°-\\theta)$ と $\\cos(180°-\\theta)$ は？",back:"$\\sin(180°-\\theta) = \\sin\\theta$\n$\\cos(180°-\\theta) = -\\cos\\theta$\n$\\tan(180°-\\theta) = -\\tan\\theta$",note:"$\\sin$ は同じ、$\\cos, \\tan$ は符号反転"},
  {id:"f34",ch:"ch4",title:"正弦定理",front:"正弦定理を書け",back:"$\\dfrac{a}{\\sin A} = \\dfrac{b}{\\sin B} = \\dfrac{c}{\\sin C} = 2R$\n\n$R$: 外接円の半径",note:"辺と対角の関係"},
  {id:"f35",ch:"ch4",title:"余弦定理",front:"余弦定理を書け",back:"$a^2 = b^2 + c^2 - 2bc\\cos A$\n\n変形: $\\cos A = \\dfrac{b^2+c^2-a^2}{2bc}$",note:"3辺から角度、2辺+挟角から辺"},
  {id:"f36",ch:"ch4",title:"三角形の面積",front:"三角形の面積公式（三角比）は？",back:"$S = \\dfrac{1}{2}bc\\sin A$\n\nヘロンの公式:\n$S = \\sqrt{s(s-a)(s-b)(s-c)}$\n$s = \\dfrac{a+b+c}{2}$",note:"2辺と挟角、または3辺"},
  {id:"f37",ch:"ch4",title:"内接円の半径",front:"三角形の内接円の半径 $r$ は？",back:"$S = \\dfrac{1}{2}r(a+b+c)$\n\nよって $r = \\dfrac{2S}{a+b+c}$",note:"面積と周の長さから求まる"},

  // 第5章 データの分析
  {id:"f38",ch:"ch5",title:"代表値",front:"平均値・中央値・最頻値の求め方は？",back:"平均値: $\\bar{x} = \\dfrac{1}{n}\\sum x_i$\n中央値: データを並べて中央の値\n最頻値: 最も頻度が高い値",note:"基本の3つ"},
  {id:"f39",ch:"ch5",title:"四分位数",front:"$Q_1, Q_2, Q_3$ の求め方は？",back:"$Q_2$: 中央値\n$Q_1$: 下半分の中央値\n$Q_3$: 上半分の中央値\n\n四分位範囲 $= Q_3 - Q_1$",note:"箱ひげ図の基礎"},
  {id:"f40",ch:"ch5",title:"分散と標準偏差",front:"分散 $s^2$ の求め方は？",back:"$s^2 = \\dfrac{1}{n}\\sum(x_i - \\bar{x})^2$\n$= \\overline{x^2} - \\bar{x}^2$（2乗の平均 − 平均の2乗）\n\n標準偏差: $s = \\sqrt{s^2}$",note:"「2乗の平均 − 平均の2乗」が計算しやすい"},
  {id:"f41",ch:"ch5",title:"データの変換",front:"各データを $y_i = ax_i + b$ と変換すると\n平均と分散はどうなる？",back:"平均: $\\bar{y} = a\\bar{x} + b$\n分散: $s_y^2 = a^2 s_x^2$\n標準偏差: $s_y = |a| s_x$",note:"定数項は分散に影響しない"},
  {id:"f42",ch:"ch5",title:"相関係数",front:"相関係数 $r$ の公式と意味は？",back:"$r = \\dfrac{s_{xy}}{s_x s_y}$\n\n$-1 \\leq r \\leq 1$\n$r \\approx 1$: 強い正の相関\n$r \\approx -1$: 強い負の相関\n$r \\approx 0$: 相関なし",note:"相関と因果は異なる！"},
  {id:"f43",ch:"ch5",title:"外れ値の判定",front:"外れ値の判定基準は？",back:"$Q_1 - 1.5 \\times IQR$ 未満\nまたは\n$Q_3 + 1.5 \\times IQR$ より大\n\n$IQR = Q_3 - Q_1$（四分位範囲）",note:"箱ひげ図のひげの外側"},
];

  {id:"p16",ch:"ch3",diff:"standard",title:"2次関数の決定",

  {id:"p17",ch:"ch3",diff:"basic",title:"2次方程式",

  {id:"p18",ch:"ch3",diff:"standard",title:"判別式",

// ============================================================
// STATE
// ============================================================
const STORAGE_KEY = 'math1-study-app';
let state = loadState();
let filteredFormulas = [...formulas];
let currentCardIndex = 0;
let filteredProblems = [...problems];
let quizState = null;

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (s) return s;
  } catch(e) {}
  return { formulaStatus:{}, problemStatus:{} };
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function getFormulaStatus(id) { return state.formulaStatus[id] || 'new'; }
function setFormulaStatus(id, st) { state.formulaStatus[id] = st; saveState(); }
function getProblemStatus(id) { return state.problemStatus[id] || 'new'; }
function setProblemStatus(id, st) { state.problemStatus[id] = st; saveState(); }

// ============================================================
// NAVIGATION
// ============================================================
function showSection(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('sec-'+name).classList.add('active');
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  if (name === 'dashboard') updateDashboard();
  if (name === 'cards') { filterCards(); }
  if (name === 'problems') { filterProblems(); }
  if (name === 'list') renderList();
}

// ============================================================
// DASHBOARD
// ============================================================
function updateDashboard() {
  const total = formulas.length;
  let known=0, learning=0;
  formulas.forEach(f => {
    const st = getFormulaStatus(f.id);
    if (st==='known') known++;
    else if (st==='learning') learning++;
  });
  const unknown = total - known - learning;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-known').textContent = known;
  document.getElementById('stat-learning').textContent = learning;
  document.getElementById('stat-unknown').textContent = unknown;
  document.getElementById('prog-known').style.width = (known/total*100)+'%';
  document.getElementById('prog-learning').style.width = (learning/total*100)+'%';

  // Chapter stats
  const chapters = [
    {id:'ch1',name:'第1章 数と式'},
    {id:'ch2',name:'第2章 集合と命題'},
    {id:'ch3',name:'第3章 2次関数'},
    {id:'ch4',name:'第4章 図形と計量'},
    {id:'ch5',name:'第5章 データの分析'},
  ];
  const container = document.getElementById('chapter-stats');
  container.innerHTML = '';
  chapters.forEach(ch => {
    const chFormulas = formulas.filter(f => f.ch === ch.id);
    const ct = chFormulas.length;
    let ck=0, cl=0;
    chFormulas.forEach(f => {
      const st = getFormulaStatus(f.id);
      if (st==='known') ck++;
      else if (st==='learning') cl++;
    });
    const pct = ct>0 ? Math.round((ck/ct)*100) : 0;
    const row = document.createElement('div');
    row.className = 'chapter-row';
    row.innerHTML = `<span class="name">${ch.name}</span>
      <div class="bar-bg"><div style="width:${ck/ct*100}%;background:var(--known)"></div><div style="width:${cl/ct*100}%;background:var(--learning)"></div></div>
      <span class="pct">${pct}%</span>`;
    container.appendChild(row);
  });

  // Problem stats
  let pSolved=0, pAttempted=0;
  problems.forEach(p => {
    const st = getProblemStatus(p.id);
    if (st==='solved') pSolved++;
    if (st==='solved'||st==='attempted') pAttempted++;
  });
  document.getElementById('stat-p-solved').textContent = pSolved;
  document.getElementById('stat-p-attempted').textContent = pAttempted;
  document.getElementById('stat-p-total').textContent = problems.length;
}

// ============================================================
// FORMULA CARDS
// ============================================================
function filterCards() {
  const ch = document.getElementById('card-chapter-filter').value;
  const st = document.getElementById('card-status-filter').value;
  filteredFormulas = formulas.filter(f => {
    if (ch!=='all' && f.ch!==ch) return false;
    if (st!=='all' && getFormulaStatus(f.id)!==st) return false;
    return true;
  });
  currentCardIndex = 0;
  renderCard();
}

function renderCard() {
  const wrapper = document.getElementById('card-wrapper');
  wrapper.classList.remove('flipped');
  if (filteredFormulas.length === 0) {
    document.getElementById('card-front').innerHTML = '<div class="card-title">カードがありません</div><div class="card-note">フィルターを変更してください</div>';
    document.getElementById('card-back').innerHTML = '';
    document.getElementById('card-counter').textContent = '0 / 0';
    return;
  }
  const f = filteredFormulas[currentCardIndex];
  const st = getFormulaStatus(f.id);
  const chName = {ch1:'数と式',ch2:'集合と命題',ch3:'2次関数',ch4:'図形と計量',ch5:'データ分析'}[f.ch];
  const badgeClass = st==='known'?'badge-known':st==='learning'?'badge-learning':'badge-new';
  const badgeText = st==='known'?'覚えた':st==='learning'?'学習中':'未学習';

  document.getElementById('card-front').innerHTML = `
    <span class="card-status-badge ${badgeClass}">${badgeText}</span>
    <span class="card-chapter-badge">${chName}</span>
    <div class="card-title">${f.title}</div>
    <div class="card-formula">${f.front}</div>`;
  document.getElementById('card-back').innerHTML = `
    <span class="card-status-badge ${badgeClass}">${badgeText}</span>
    <span class="card-chapter-badge">${chName}</span>
    <div class="card-title">${f.title}</div>
    <div class="card-formula">${f.back.replace(/\n/g,'<br>')}</div>
    <div class="card-note">${f.note}</div>`;
  document.getElementById('card-counter').textContent = `${currentCardIndex+1} / ${filteredFormulas.length}`;

  setTimeout(() => renderMath(document.getElementById('card-front')), 10);
  setTimeout(() => renderMath(document.getElementById('card-back')), 10);
}

function flipCard() {
  document.getElementById('card-wrapper').classList.toggle('flipped');
}
function nextCard() {
  if (filteredFormulas.length===0) return;
  currentCardIndex = (currentCardIndex+1) % filteredFormulas.length;
  renderCard();
}
function prevCard() {
  if (filteredFormulas.length===0) return;
  currentCardIndex = (currentCardIndex-1+filteredFormulas.length) % filteredFormulas.length;
  renderCard();
}
function shuffleCards() {
  for (let i=filteredFormulas.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [filteredFormulas[i],filteredFormulas[j]]=[filteredFormulas[j],filteredFormulas[i]];
  }
  currentCardIndex=0;
  renderCard();
}
function markCard(status) {
  if (filteredFormulas.length===0) return;
  setFormulaStatus(filteredFormulas[currentCardIndex].id, status);
  renderCard();
}

// ============================================================
// PROBLEMS
// ============================================================
function filterProblems() {
  const ch = document.getElementById('prob-chapter-filter').value;
  const diff = document.getElementById('prob-diff-filter').value;
  filteredProblems = problems.filter(p => {
    if (ch!=='all' && p.ch!==ch) return false;
    if (diff!=='all' && p.diff!==diff) return false;
    return true;
  });
  renderProblems();
}

function renderProblems() {
  const container = document.getElementById('problems-container');
  container.innerHTML = '';
  if (filteredProblems.length===0) {
    container.innerHTML='<p style="text-align:center;color:var(--text-light);padding:40px;">該当する問題がありません</p>';
    return;
  }
  filteredProblems.forEach((p, i) => {
    const diffLabel = {basic:'基本',standard:'標準',advanced:'応用'}[p.diff];
    const diffClass = {basic:'diff-basic',standard:'diff-standard',advanced:'diff-advanced'}[p.diff];
    const st = getProblemStatus(p.id);
    const card = document.createElement('div');
    card.className = 'problem-card';
    card.innerHTML = `
      <div class="problem-header">
        <span class="problem-id">${p.title}</span>
        <span class="problem-diff ${diffClass}">${diffLabel}</span>
      </div>
      <div class="problem-text">${p.question.replace(/\n/g,'<br>')}</div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <button class="btn-show-solution" onclick="toggleSolution(this, '${p.id}')">解答を見る</button>
        <button class="btn-mark btn-known" onclick="markProblem('${p.id}','solved',this)" ${st==='solved'?'style="opacity:.5"':''}>正解</button>
        <button class="btn-mark btn-learning" onclick="markProblem('${p.id}','attempted',this)">復習</button>
        ${st!=='new'?`<span style="font-size:.8em;color:${st==='solved'?'var(--known)':'var(--learning)'};">✓ ${st==='solved'?'正解済み':'復習中'}</span>`:''}
      </div>
      <div class="solution-area" id="sol-${p.id}">
        <h4>解答・解説</h4>
        <div class="solution-text">${p.solution.replace(/\n/g,'<br>')}</div>
      </div>`;
    container.appendChild(card);
  });
  setTimeout(() => renderMath(container), 10);
}

function toggleSolution(btn, pid) {
  const sol = document.getElementById('sol-'+pid);
  sol.classList.toggle('visible');
  btn.textContent = sol.classList.contains('visible') ? '解答を隠す' : '解答を見る';
  if (sol.classList.contains('visible')) {
    setTimeout(() => renderMath(sol), 10);
  }
}
function markProblem(pid, status) {
  setProblemStatus(pid, status);
  filterProblems();
}

// ============================================================
// QUIZ
// ============================================================
function startQuiz() {
  const ch = document.getElementById('quiz-chapter').value;
  const countVal = document.getElementById('quiz-count').value;
  let pool = quizData.filter(q => ch==='all' || q.ch===ch);
  // shuffle
  for (let i=pool.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [pool[i],pool[j]]=[pool[j],pool[i]];
  }
  const count = countVal==='all' ? pool.length : Math.min(parseInt(countVal), pool.length);
  pool = pool.slice(0, count);
  quizState = { questions:pool, current:0, correct:0, wrong:0, answered:false };
  renderQuizQuestion();
}

function renderQuizQuestion() {
  const area = document.getElementById('quiz-area');
  if (!quizState || quizState.current >= quizState.questions.length) {
    // Show final results
    const total = quizState.questions.length;
    const pct = Math.round(quizState.correct/total*100);
    const cls = pct>=80?'good':pct>=50?'mid':'bad';
    area.innerHTML = `<div class="quiz-final">
      <h2>クイズ結果</h2>
      <div class="big-score ${cls}">${pct}%</div>
      <div class="quiz-score-bar">
        <span class="q-correct">正解: ${quizState.correct}</span>
        <span class="q-wrong">不正解: ${quizState.wrong}</span>
      </div>
      <p style="margin-top:12px;color:var(--text-light);">${total}問中 ${quizState.correct}問正解</p>
      <button class="btn-quiz-start" style="margin-top:16px;" onclick="startQuiz()">もう一度</button>
    </div>`;
    return;
  }
  const q = quizState.questions[quizState.current];
  quizState.answered = false;
  let optionsHtml = q.options.map((o, i) =>
    `<div class="quiz-option" onclick="answerQuiz(${i})" id="qopt-${i}">${o}</div>`
  ).join('');
  area.innerHTML = `
    <div class="quiz-progress">${quizState.current+1} / ${quizState.questions.length}</div>
    <div class="quiz-score-bar">
      <span class="q-correct">正解: ${quizState.correct}</span>
      <span class="q-wrong">不正解: ${quizState.wrong}</span>
    </div>
    <div class="quiz-question">
      <div class="quiz-prompt">次の問いに答えよ</div>
      <div class="quiz-formula">${q.question}</div>
      <div class="quiz-options">${optionsHtml}</div>
    </div>
    <div id="quiz-result-area"></div>`;
  setTimeout(() => renderMath(area), 10);
}

function answerQuiz(idx) {
  if (quizState.answered) return;
  quizState.answered = true;
  const q = quizState.questions[quizState.current];
  const isCorrect = idx === q.answer;
  if (isCorrect) quizState.correct++; else quizState.wrong++;

  // Mark options
  document.querySelectorAll('.quiz-option').forEach((el, i) => {
    el.classList.add('disabled');
    if (i === q.answer) el.classList.add('correct');
    if (i === idx && !isCorrect) el.classList.add('wrong');
  });

  const resultArea = document.getElementById('quiz-result-area');
  resultArea.innerHTML = `
    <div class="quiz-result ${isCorrect?'correct-result':'wrong-result'}">
      ${isCorrect?'正解！':'不正解…正解は上の緑のマーク'}
    </div>
    <div style="text-align:center;">
      <button class="quiz-next-btn" onclick="quizNext()">
        ${quizState.current+1 < quizState.questions.length ? '次の問題 →' : '結果を見る'}
      </button>
    </div>`;
}

function quizNext() {
  quizState.current++;
  renderQuizQuestion();
}

  const ch = document.getElementById('list-chapter-filter').value;
  const filtered = formulas.filter(f => ch==='all' || f.ch===ch);
  const tbody = document.getElementById('formula-list-body');
  const chNames = {ch1:'数と式',ch2:'集合と命題',ch3:'2次関数',ch4:'図形と計量',ch5:'データ分析'};
  tbody.innerHTML = filtered.map(f => {
    const st = getFormulaStatus(f.id);
    const stClass = st==='known'?'st-known':st==='learning'?'st-learning':'st-new';
    const stText = st==='known'?'覚えた':st==='learning'?'学習中':'未学習';
    return `<tr><td>${f.id}</td><td>${f.title}</td><td>${chNames[f.ch]}</td><td class="${stClass}">${stText}</td></tr>`;
  }).join('');
}

// ============================================================
// SETTINGS
// ============================================================
function resetAll() {
  if (!confirm('本当にすべての学習データをリセットしますか？')) return;
  state = { formulaStatus:{}, problemStatus:{} };
  saveState();
  updateDashboard();
  alert('リセットしました。');
}

// ============================================================
// MATH RENDERING
// ============================================================
function renderMath(el) {
  if (typeof renderMathInElement === 'function') {
    renderMathInElement(el, {
      delimiters: [
        {left:'$$',right:'$$',display:true},
        {left:'$',right:'$',display:false}
      ],
      throwOnError:false
    });
  }
}

// ============================================================
// KEYBOARD
// ============================================================
document.addEventListener('keydown', e => {
  const sec = document.querySelector('.section.active');
  if (!sec) return;
  if (sec.id === 'sec-cards') {
    if (e.key==='ArrowRight') nextCard();
    else if (e.key==='ArrowLeft') prevCard();
    else if (e.key===' '||e.key==='Enter') { e.preventDefault(); flipCard(); }
    else if (e.key==='1') markCard('known');
    else if (e.key==='2') markCard('learning');
    else if (e.key==='3') markCard('new');
  }
});

// ============================================================
// INIT
// ============================================================
updateDashboard();
</script>
</body>
</html>
